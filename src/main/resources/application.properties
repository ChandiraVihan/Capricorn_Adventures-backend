#spring.datasource.password=
# Disable automatic SQL initialization since data.sql is not ready for use
spring.sql.init.mode=never

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASS}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.format_sql=true
# Set the database URL (this tells it to run in memory 'mem' and names it 'capricorn_db')
#spring.datasource.url=jdbc:h2:mem:capricorn_db
#spring.datasource.driverClassName=org.h2.Driver
#
## Default credentials for H2
#spring.datasource.username=sa
#spring.datasource.password=
