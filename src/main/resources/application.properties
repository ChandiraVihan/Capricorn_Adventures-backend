spring.application.name=Capricorn Adventures

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASS}
#spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.format_sql=true
# Set the database URL (this tells it to run in memory 'mem' and names it 'capricorn_db')
#spring.datasource.url=jdbc:h2:mem:capricorn_db
#spring.datasource.driverClassName=org.h2.Driver
#
## Default credentials for H2
#spring.datasource.username=sa
#spring.datasource.password=
#
## Tell Hibernate to use the H2 dialect
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
## Defer the execution of data.sql until Hibernate finishes creating the schema
#spring.jpa.defer-datasource-initialization=true
#
## Enable the H2 console so you can view your data in a browser (optional but highly recommended!)
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#server.forward-headers-strategy=framework

# Frontend URL for links sent in emails
app.frontend.url=http://localhost:5173

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
# Use a strong secret in production! This is just for development.
app.jwt.secret=${JWT_SECRET}
# 1 hour in milliseconds
app.jwt.access-token-expiry=3600000
# 30 days in milliseconds
app.jwt.refresh-token-expiry=2592000000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173

# Google OAuth2 Configuration
# Replace with your actual Google Cloud Console credentials
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/google

# PayHere Configuration
payhere.base.url=https://sandbox.payhere.lk/merchant/v1
payhere.merchant.id=${PAYHERE_MERCHANT_ID}
payhere.merchant.secret=${PAYHERE_MERCHANT_SECRET}
payhere.app.id=${PAYHERE_APP_ID}
payhere.app.secret=${PAYHERE_APP_SECRET}

# Finance dashboard configuration
app.finance.hotel-cost-rate=0.45
app.finance.adventure-cost-rate=0.50
app.finance.third-party-commission-rate=0.12
app.finance.tax-rate=0.18
app.finance.monthly-revenue-budget=1000000
app.finance.monthly-cost-budget=550000
app.finance.monthly-gross-margin-budget=450000
app.finance.monthly-net-profit-budget=300000
