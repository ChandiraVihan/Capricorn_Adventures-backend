spring.application.name=Capricorn Adventures

//spring.datasource.url=${DB_URL}
//spring.datasource.username=${DB_NAME}
//spring.datasource.password=${DB_PASSWORD}

//spring.jpa.hibernate.ddl-auto=none
//spring.jpa.show-sql=true
//spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.format_sql=true
# Set the database URL (this tells it to run in memory 'mem' and names it 'capricorn_db')
spring.datasource.url=jdbc:h2:mem:capricorn_db
spring.datasource.driverClassName=org.h2.Driver

# Default credentials for H2
spring.datasource.username=sa
spring.datasource.password=

# Tell Hibernate to use the H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Defer the execution of data.sql until Hibernate finishes creating the schema
spring.jpa.defer-datasource-initialization=true

# Enable the H2 console so you can view your data in a browser (optional but highly recommended!)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.forward-headers-strategy=framework

# Frontend URL for links sent in emails
app.frontend.url=http://localhost:5173

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
# Use a strong secret in production! This is just for development.
app.jwt.secret=9a4f2c8d3b7e1f6g5h4i3j2k1l0m9n8o7p6q5r4s3t2u1v0w9x8y7z6a5b4c3d2e1f2g3h4i5j6k7l8m9n0
# 1 hour in milliseconds
app.jwt.access-token-expiry=3600000
# 30 days in milliseconds
app.jwt.refresh-token-expiry=2592000000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173

# Google OAuth2 Configuration
# Replace with your actual Google Cloud Console credentials
spring.security.oauth2.client.registration.google.client-id=your-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/google
