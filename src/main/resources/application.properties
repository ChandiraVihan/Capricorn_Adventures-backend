spring.application.name=Capricorn Adventures

//spring.datasource.url=${DB_URL}
//spring.datasource.username=${DB_NAME}
//spring.datasource.password=${DB_PASSWORD}

//spring.jpa.hibernate.ddl-auto=none
//spring.jpa.show-sql=true
//spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.format_sql=true
# Set the database URL (this tells it to run in memory 'mem' and names it 'capricorn_db')
spring.datasource.url=jdbc:h2:mem:capricorn_db
spring.datasource.driverClassName=org.h2.Driver

# Default credentials for H2
spring.datasource.username=sa
spring.datasource.password=

# Tell Hibernate to use the H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Defer the execution of data.sql until Hibernate finishes creating the schema
spring.jpa.defer-datasource-initialization=true

# Enable the H2 console so you can view your data in a browser (optional but highly recommended!)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.forward-headers-strategy=framework

# JWT Configuration
app.jwt.secret=your-secret-key-min-32-characters-required-for-hs256-algorithm
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# Frontend URL used in password reset emails
app.frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# Local mail configuration (creates JavaMailSender bean without real SMTP account)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

