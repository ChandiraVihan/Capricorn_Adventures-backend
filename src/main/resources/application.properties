# Frontend URL for links sent in emails
app.frontend.url=http://localhost:5173

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Configuration
# Use a strong secret in production! This is just for development.
app.jwt.secret=capricorn-adventure-secret-key-minimum-32-chars-long
# 1 hour in milliseconds
app.jwt.access-token-expiry=3600000
# 30 days in milliseconds
app.jwt.refresh-token-expiry=2592000000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/google

# PayHere Configuration
payhere.base.url=https://sandbox.payhere.lk/merchant/v1
payhere.merchant.id=${PAYHERE_MERCHANT_ID}
payhere.merchant.secret=${PAYHERE_MERCHANT_SECRET}
payhere.app.id=${PAYHERE_APP_ID}
payhere.app.secret=${PAYHERE_APP_SECRET}

# application.properties
google.places.api.key=${GOOGLE_PLACES_API_KEY}

# ============================================================
# Car Rental Add-On Configuration
# ============================================================

# External rental partner API
car.rental.partner.base-url=http://localhost:8089
car.rental.partner.api-key=your-api-key-here
car.rental.partner.website-url=https://www.rentalpartner.example.com
car.rental.partner.name=RentalPartner
